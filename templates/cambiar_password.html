{% extends "base.html" %}
{% block title %}Cambiar Contraseña - SLH{% endblock %}

{% block content %}
<section class="detail-hero">
    <div class="detail-hero-content">
        <a href="{{ url_for('main.dashboard') }}" class="back-link">
            <i class="fas fa-arrow-left"></i> Volver al Dashboard
        </a>
        <div class="detail-header">
            <div class="detail-icon-wrapper">
                <i class="fas fa-key"></i>
            </div>
            <div>
                <h1 class="detail-title">Cambiar Contraseña</h1>
                <span class="detail-status" style="background: #966e1e;">
                    {{ session.get('username') }}
                </span>
            </div>
        </div>
    </div>
</section>

<section class="detail-content" style="max-width:480px;margin:0 auto;">
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div style="background:rgba(220,53,69,0.15);border:1px solid rgba(220,53,69,0.3);color:#ff6b7a;padding:12px 16px;border-radius:10px;margin-bottom:1.5rem;font-size:0.9rem;">
        <i class="fas fa-exclamation-circle"></i> {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <div class="detail-card" style="padding:2rem;">
        <form method="POST" action="{{ url_for('auth.cambiar_password') }}">
            <div style="margin-bottom:1.25rem;">
                <label style="display:block;font-size:0.85rem;font-weight:500;color:#a0a0b8;margin-bottom:0.5rem;">
                    <i class="fas fa-lock" style="color:#966e1e;"></i> Contraseña actual
                </label>
                <input type="password" name="old_password" required
                    style="width:100%;padding:12px 16px;background:#0d0d1a;border:1px solid rgba(150,110,30,0.2);border-radius:10px;color:#f5f5f5;font-size:0.95rem;font-family:inherit;">
            </div>
            <div style="margin-bottom:1.25rem;">
                <label style="display:block;font-size:0.85rem;font-weight:500;color:#a0a0b8;margin-bottom:0.5rem;">
                    <i class="fas fa-key" style="color:#966e1e;"></i> Nueva contraseña
                </label>
                <input type="password" name="new_password" required minlength="4"
                    style="width:100%;padding:12px 16px;background:#0d0d1a;border:1px solid rgba(150,110,30,0.2);border-radius:10px;color:#f5f5f5;font-size:0.95rem;font-family:inherit;">
            </div>
            <div style="margin-bottom:1.5rem;">
                <label style="display:block;font-size:0.85rem;font-weight:500;color:#a0a0b8;margin-bottom:0.5rem;">
                    <i class="fas fa-check-double" style="color:#966e1e;"></i> Confirmar nueva contraseña
                </label>
                <input type="password" name="confirm_password" required minlength="4"
                    style="width:100%;padding:12px 16px;background:#0d0d1a;border:1px solid rgba(150,110,30,0.2);border-radius:10px;color:#f5f5f5;font-size:0.95rem;font-family:inherit;">
            </div>
            <button type="submit" style="width:100%;padding:14px;background:linear-gradient(135deg,#966e1e,#af8e4b);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
                <i class="fas fa-save"></i> Guardar Contraseña
            </button>
        </form>
    </div>
</section>
{% endblock %}
