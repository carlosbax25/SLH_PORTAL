<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - SLH</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='LOGO-SLH.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d0d1a;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container { width: 100%; max-width: 420px; }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo img { height: 80px; filter: drop-shadow(0 0 20px rgba(150,110,30,0.4)); }
        .card {
            background: #1a1a2e;
            border: 1px solid rgba(150,110,30,0.2);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: #a0a0b8; font-size: 0.9rem; margin-bottom: 2rem; }
        .flash {
            background: rgba(150,110,30,0.15);
            border: 1px solid rgba(150,110,30,0.3);
            color: #d4a843;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block; font-size: 0.85rem; font-weight: 500;
            color: #a0a0b8; margin-bottom: 0.5rem;
        }
        .form-group label i { color: #966e1e; margin-right: 4px; }
        .form-group input {
            width: 100%; padding: 12px 16px;
            background: #0d0d1a;
            border: 1px solid rgba(150,110,30,0.2);
            border-radius: 10px;
            color: #f5f5f5; font-size: 0.95rem; font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            outline: none; border-color: #966e1e;
            box-shadow: 0 0 0 3px rgba(150,110,30,0.2);
        }
        .form-group input::placeholder { color: #6c6c88; }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #966e1e, #af8e4b);
            border: none; border-radius: 10px;
            color: #fff; font-size: 1rem; font-weight: 600;
            font-family: inherit; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: box-shadow 0.3s, transform 0.3s;
        }
        .btn:hover { box-shadow: 0 8px 24px rgba(150,110,30,0.4); transform: translateY(-2px); }
        .back-link {
            display: block; text-align: center; margin-top: 1.5rem;
            color: #966e1e; text-decoration: none; font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }
        .footer { text-align: center; color: #6c6c88; font-size: 0.8rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="{{ url_for('static', filename='LOGO-SLH.png') }}" alt="SLH">
        </div>
        <div class="card">
            <h1>Recuperar Contraseña</h1>
            <p class="subtitle">Se enviará una contraseña temporal al administrador</p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="flash">
                <i class="fas fa-info-circle"></i> {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.olvide_password') }}">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Nombre de usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingrese su usuario" required autocomplete="username">
                </div>
                <button type="submit" class="btn">
                    <i class="fas fa-paper-plane"></i> Solicitar Contraseña Temporal
                </button>
            </form>
            <a href="{{ url_for('auth.login') }}" class="back-link">
                <i class="fas fa-arrow-left"></i> Volver al Login
            </a>
        </div>
        <p class="footer">&copy; 2026 SLH &mdash; Centro de Automatización</p>
    </div>
</body>
</html>
