<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SLH</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='LOGO-SLH.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0d0d1a;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo img {
            height: 80px;
            width: auto;
            filter: drop-shadow(0 0 20px rgba(150, 110, 30, 0.4));
        }
        .login-card {
            background: #1a1a2e;
            border: 1px solid rgba(150, 110, 30, 0.2);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .login-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            text-align: center;
            color: #a0a0b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
</style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="{{ url_for('static', filename='LOGO-SLH.png') }}" alt="SLH">
        </div>
        <div class="login-card">
            <h1 class="login-title">Iniciar Sesión</h1>
            <p class="login-subtitle">Centro de Automatización SLH</p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="flash-error">
                <i class="fas fa-exclamation-circle"></i>
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Nombre de usuario" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Contraseña" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>
            <a href="{{ url_for('auth.olvide_password') }}" style="display:block;text-align:center;margin-top:1rem;color:#966e1e;text-decoration:none;font-size:0.85rem;">
                ¿Olvidó su contraseña?
            </a>
        </div>
        <p class="login-footer">&copy; 2026 SLH &mdash; Centro de Automatización</p>
    </div>

    <style>
        .flash-error {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff6b7a;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #a0a0b8;
            margin-bottom: 0.5rem;
        }
        .form-group label i {
            color: #966e1e;
            margin-right: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0d0d1a;
            border: 1px solid rgba(150, 110, 30, 0.2);
            border-radius: 10px;
            color: #f5f5f5;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #966e1e;
            box-shadow: 0 0 0 3px rgba(150, 110, 30, 0.2);
        }
        .form-group input::placeholder {
            color: #6c6c88;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #966e1e, #af8e4b);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: box-shadow 0.3s, transform 0.3s;
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            box-shadow: 0 8px 24px rgba(150, 110, 30, 0.4);
            transform: translateY(-2px);
        }
        .login-footer {
            text-align: center;
            color: #6c6c88;
            font-size: 0.8rem;
            margin-top: 2rem;
        }
    </style>
</body>
</html>
